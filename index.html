<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeehowLi | Personal Site</title>
  <meta name="description" content="SeehowLi 的个人主页：简介、项目与联系方式" />
  <style>
    :root {
      --bg: #f7f8f5;
      --card: #ffffff;
      --text: #1b1d1f;
      --sub: #5e646b;
      --accent: #0f766e;
      --line: #e7e9ec;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 0%, #e9f7f3 0%, var(--bg) 45%);
      line-height: 1.7;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px 60px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,.04);
    }
    h1, h2 { margin: 0 0 10px; }
    h1 { font-size: 34px; }
    h2 { font-size: 22px; }
    p { margin: 0 0 10px; color: var(--sub); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e7f5f2;
      color: #0b5e58;
      font-size: 13px;
      margin-right: 8px;
      margin-top: 6px;
    }
    ul { padding-left: 18px; margin: 8px 0 0; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Hi, I'm SeehowLi</h1>
      <p>欢迎来到我的个人网站。这里会展示我的学习、项目和联系方式。</p>
      <span class="tag">Research</span>
      <span class="tag">Coding</span>
      <span class="tag">Notes</span>
    </section>

    <section class="card">
      <h2>关于我</h2>
      <p>你可以在这里补充学校/方向/兴趣，例如：计算机相关研究、Web 开发、AI 应用等。</p>
    </section>

    <section class="card">
      <h2>项目</h2>
      <ul>
        <li><a href="https://github.com/SeehowLi" target="_blank">GitHub 主页</a></li>
        <li>项目 A（这里填简介和链接）</li>
        <li>项目 B（这里填简介和链接）</li>
      </ul>
    </section>

    <section class="card">
      <h2>联系方式</h2>
      <p>Email：youremail@example.com</p>
      <p>GitHub：<a href="https://github.com/SeehowLi" target="_blank">@SeehowLi</a></p>
    </section>
  </main>
</body>
</html>
